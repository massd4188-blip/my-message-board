<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - RFID Scanner</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-panel {
            max-width: 800px;
            margin: 0 auto;
        }
        .card-list {
            margin: 20px 0;
        }
        .card-item {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-uid {
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
        }
        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .add-card {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        .add-card input {
            padding: 10px;
            width: 200px;
            margin-right: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .add-card button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container admin-panel">
        <h1>🔐 Admin Panel</h1>
        <p>Manage authorized RFID cards</p>
        
        <div class="card-list">
            <h2>Authorized Cards</h2>
            <div id="cardList"></div>
        </div>
        
        <div class="add-card">
            <h3>Add New Authorized Card</h3>
            <input type="text" id="newCardUID" placeholder="Enter Card UID (e.g., 5A421307)">
            <button onclick="addAuthorizedCard()">Add Card</button>
        </div>
        
        <a href="index.html" class="back-link">← Back to Dashboard</a>
    </div>
    
    <script>
        const AUTHORIZED_FILE = 'authorized_cards.txt';
        
        async function loadAuthorizedCards() {
            try {
                const url = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/${AUTHORIZED_FILE}`;
                const response = await fetch(url);
                const text = await response.text();
                const cards = text.trim().split('\n').filter(c => c.trim());
                displayCards(cards);
            } catch (error) {
                console.error('Error loading authorized cards:', error);
            }
        }
        
        function displayCards(cards) {
            const container = document.getElementById('cardList');
            if (cards.length === 0) {
                container.innerHTML = '<p>No authorized cards yet</p>';
                return;
            }
            
            container.innerHTML = cards.map(card => `
                <div class="card-item">
                    <span class="card-uid">${card}</span>
                    <button class="remove-btn" onclick="removeCard('${card}')">Remove</button>
                </div>
            `).join('');
        }
        
        function addAuthorizedCard() {
            const uid = document.getElementById('newCardUID').value.trim().toUpperCase();
            if (uid) {
                alert(`Add functionality requires GitHub API integration\nUID: ${uid}`);
                document.getElementById('newCardUID').value = '';
            }
        }
        
        function removeCard(uid) {
            if (confirm(`Remove card ${uid}?`)) {
                alert('Remove functionality requires GitHub API integration');
            }
        }
        
        loadAuthorizedCards();
    </script>
</body>
</html>
