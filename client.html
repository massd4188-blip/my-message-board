<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client View - Access Log</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .client-view {
            text-align: center;
        }
        .access-status {
            margin: 30px 0;
        }
        .granted {
            color: #28a745;
            font-size: 48px;
        }
        .denied {
            color: #dc3545;
            font-size: 48px;
        }
        .recent-access {
            margin-top: 30px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container client-view">
        <h1>🚪 Door Access Log</h1>
        <p>Your recent access history</p>
        
        <div class="access-status">
            <h2>Last Scan Status</h2>
            <div id="lastStatus">Waiting for scan...</div>
        </div>
        
        <div class="recent-access">
            <h2>Recent Access Attempts</h2>
            <div id="recentTable"></div>
        </div>
        
        <a href="index.html" class="back-link">← Back to Dashboard</a>
    </div>
    
    <script src="script.js"></script>
    <script>
        async function loadClientData() {
            const url = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/${DATA_FILE}`;
            const response = await fetch(url);
            const text = await response.text();
            const lines = text.trim().split('\n');
            const scans = lines.map(line => {
                const [timestamp, uid] = line.split(',');
                return { timestamp, uid: uid ? uid.trim() : null };
            }).filter(s => s.uid);
            
            // Show last 10 scans
            const recent = scans.reverse().slice(0, 10);
            const tableHtml = `
                <table>
                    <thead><tr><th>Date/Time</th><th>Card ID</th><th>Access</th></tr></thead>
                    <tbody>
                        ${recent.map(scan => `
                            <tr>
                                <td>${scan.timestamp || 'Unknown'}</td>
                                <td>${scan.uid}</td>
                                <td style="color: green">✅ Granted</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('recentTable').innerHTML = tableHtml;
        }
        
        loadClientData();
        setInterval(loadClientData, 15000);
    </script>
</body>
</html>
