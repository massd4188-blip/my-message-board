<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Card Scanner - Live Data</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📡 RFID Card Scanner</h1>
        <p>Live data from your Raspberry Pi Pico RFID reader</p>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total Scans</h3>
                <p id="totalScans">0</p>
            </div>
            <div class="stat-card">
                <h3>Last Scan</h3>
                <p id="lastScan">--</p>
            </div>
        </div>
        
        <div class="table-container">
            <h2>Scan History</h2>
            <table id="scanTable">
                <thead>
                    <tr><th>Timestamp</th><th>Card UID</th></tr>
                </thead>
                <tbody id="scanTableBody">
                    <tr><td colspan="2">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="admin-section">
            <h2>Admin Panel</h2>
            <div class="admin-links">
                <a href="admin.html" class="admin-btn">Manage Authorized Cards</a>
                <a href="client.html" class="client-btn">Client View</a>
            </div>
        </div>
        
        <footer>
            <p>Powered by Raspberry Pi Pico + ESP-01S | Data stored on GitHub</p>
            <p>Last updated: <span id="lastUpdated">--</span></p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
