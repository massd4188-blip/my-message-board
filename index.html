<!DOCTYPE html>
<html>
<head>
  <title>RFID Door Access Log</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 50px auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background-color: #4CAF50; color: white; }
    tr:nth-child(even) { background-color: #f2f2f2; }
    .granted { color: green; font-weight: bold; }
    .denied { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🔐 RFID Door Access Log</h1>
  <p>Live data from your RFID system</p>
  
  <table id="accessTable">
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>Card UID</th>
        <th>Access</th>
      </tr>
    </thead>
    <tbody id="logEntries">
      <tr><td colspan="3">Loading...</td></tr>
    </tbody>
  </table>
  
  <script>
    // Replace with YOUR Google Sheet ID
    const SHEET_ID = '1ugqT_zOJ4qCh9GkKkp0bjLqNXRrLAO0leG9y6aaT_7A';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/1ugqT_zOJ4qCh9GkKkp0bjLqNXRrLAO0leG9y6aaT_7A/edit?usp=sharing`;
    
    function loadAccessLog() {
      fetch(SHEET_URL)
        .then(response => response.text())
        .then(data => {
          // Parse Google Visualization API JSON
          const jsonText = data.substring(47).slice(0, -2);
          const json = JSON.parse(jsonText);
          
          const tbody = document.getElementById('logEntries');
          tbody.innerHTML = '';
          
          // Skip header row, show last 50 entries
          const rows = json.table.rows.slice(-50).reverse();
          
          rows.forEach(row => {
            const tr = document.createElement('tr');
            const timestamp = row.c[0]?.v || 'N/A';
            const uid = row.c[1]?.v || 'N/A';
            const access = row.c[2]?.v || 'N/A';
            
            tr.innerHTML = `
              <td>${timestamp}</td>
              <td><code>${uid}</code></td>
              <td class="${access === 'Granted' ? 'granted' : 'denied'}">${access}</td>
            `;
            tbody.appendChild(tr);
          });
        })
        .catch(error => {
          document.getElementById('logEntries').innerHTML = 
            '<tr><td colspan="3">Error loading data. Check Sheet ID.</td></tr>';
          console.error('Error:', error);
        });
    }
    
    // Load data initially and refresh every 30 seconds
    loadAccessLog();
    setInterval(loadAccessLog, 30000);
  </script>
</body>
</html>
