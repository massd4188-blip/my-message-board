<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .message {
            background: #f0f0f0;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            animation: fadeIn 0.5s;
            font-family: monospace;
        }

        .timestamp {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9em;
        }

        .message-text {
            margin-top: 5px;
            color: #333;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .error {
            color: red;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Live Message Board</h1>
        <div id="messages">
            <div class="loading">Loading messages...</div>
        </div>
    </div>

    <script>
        // Function to load and display messages
        function loadMessages() {
            // Try multiple possible paths for data.txt
            const possiblePaths = [
                'data.txt',                    // Same directory
                './data.txt',                  // Current directory
                '/my-message-board/data.txt',  // Absolute path from root
                'https://massd4188-blip.github.io/my-message-board/data.txt'  // Full URL
            ];
            
            function tryPath(index) {
                if (index >= possiblePaths.length) {
                    document.getElementById('messages').innerHTML = '<div class="error">❌ Could not load messages. Please check the console for errors.</div>';
                    return;
                }
                
                const path = possiblePaths[index];
                console.log('Trying to load from:', path);
                
                fetch(path, {
                    cache: 'no-store',  // Don't cache the response
                    headers: {
                        'Cache-Control': 'no-cache'
                    }
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return response.text();
                })
                .then(data => {
                    console.log('Successfully loaded from:', path);
                    displayMessages(data);
                })
                .catch(error => {
                    console.log(`Failed with ${path}:`, error);
                    tryPath(index + 1);  // Try next path
                });
            }
            
            function displayMessages(data) {
                const messageList = document.getElementById('messages');
                const lines = data.split('\n').filter(line => line.trim());
                
                if (lines.length === 0) {
                    messageList.innerHTML = '<div class="message">No messages yet. Be the first to post! 💬</div>';
                    return;
                }
                
                // Reverse to show newest last (optional - change if you want newest first)
                const messagesHtml = lines.map(line => {
                    // Try to parse timestamp and message
                    const match = line.match(/\[(.*?)\]\s*(.*)/);
                    if (match) {
                        return `
                            <div class="message">
                                <div class="timestamp">📅 ${match[1]}</div>
                                <div class="message-text">${escapeHtml(match[2])}</div>
                            </div>
                        `;
                    } else {
                        return `
                            <div class="message">
                                <div class="message-text">${escapeHtml(line)}</div>
                            </div>
                        `;
                    }
                }).join('');
                
                messageList.innerHTML = messagesHtml;
            }
            
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            // Start trying paths
            tryPath(0);
        }
        
        // Load messages immediately
        loadMessages();
        
        // Auto-refresh every 5 seconds
        setInterval(loadMessages, 5000);
    </script>
</body>
</html>
