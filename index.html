<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCR - Admin Access</title>
  <!-- no styles, no gradients, no shadows, just plain simple amateur style -->
</head>
<body>
  <!-- 
    ==================================================
    ADMIN LOGIN SECTION - protects the main content
    login: admin / password: admin
    ==================================================
  -->
  <div id="loginContainer" style="max-width: 400px; margin: 80px auto; padding: 20px; border: 1px solid #ccc; background: #f9f9f9;">
    <h2>Login</h2>
    <hr>
    <div style="margin-bottom: 15px;">
      <label><strong>User:</strong></label><br>
      <input type="text" id="loginUsername" style="width: 100%; padding: 6px; margin-top: 5px; box-sizing: border-box;" placeholder="enter username">
    </div>
    <div style="margin-bottom: 15px;">
      <label><strong>Pass:</strong></label><br>
      <input type="password" id="loginPassword" style="width: 100%; padding: 6px; margin-top: 5px; box-sizing: border-box;" placeholder="enter password">
    </div>
    <button onclick="attemptLogin()" style="padding: 8px 20px; font-size: 1rem; cursor: pointer;">Login</button>
    <div id="loginErrorMsg" style="margin-top: 12px; color: #a00; font-size: 0.9em;"></div>
    <hr style="margin-top: 20px;">
    
  </div>

  <!-- 
    ==================================================
    MAIN CONTENT (hidden until login success)
    ==================================================
  -->
  <div id="mainContent" style="display: none; max-width: 1100px; margin: 15px auto; padding: 0 10px;">
    <!-- simple header -->
    <hr>
    <h1>MCR</h1>
    <hr>
    
    <div>
      <strong>System status:</strong> <span id="systemStatus">loading...</span>
      <span style="margin-left: 20px;">|</span>
      <strong>Last update:</strong> <span id="lastUpdate">--</span>
      <span style="margin-left: 20px;">|</span>
      <button onclick="loadAccessLog()" style="padding: 4px 12px; font-size: 0.9rem;">refresh</button>
      <span style="margin-left: 20px;">|</span>
      <button onclick="logout()" style="padding: 4px 12px; font-size: 0.9rem;">logout</button>
    </div>
    
    <br>
    
    <!-- statistics: simple inline numbers -->
    <div>
      <strong>Statistics:</strong>
      <span>Total scans: <span id="totalAccess">0</span></span>&nbsp;&nbsp;|&nbsp;&nbsp;
      <span>Granted: <span id="grantedAccess">0</span></span>&nbsp;&nbsp;|&nbsp;&nbsp;
      <span>Denied: <span id="deniedAccess">0</span></span>
    </div>
    
    <br>
    <hr>
    
    <!-- access log table - very basic -->
    <div>
      <h3>Access Log Entries</h3>
      <table border="1" cellpadding="6" cellspacing="0" style="border-collapse: collapse; width: 100%; background: white;">
        <thead>
          <tr>
            <th>#</th>
            <th>Timestamp</th>
            <th>Card UID</th>
            <th>Access Status</th>
          </tr>
        </thead>
        <tbody id="logEntries">
          <tr>
            <td colspan="4" align="center">loading data from github...</td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <br>
    <hr>
    <footer>
      <small>RFID system | data from github repo (plain text)</small><br>
      <small>raspberry pi pico + python logger</small>
    </footer>
  </div>
  
  <script>
    // ==================================================
    // ADMIN CREDENTIALS
    // ==================================================
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin';
    
    // ==================================================
    // GITHUB CONFIGURATION
    // ==================================================
    const GITHUB_USERNAME = 'massd4188-blip';      // your github username
    const REPO_NAME = 'my-message-board';          // repo name
    const FILE_PATH = 'data.txt';                  // data file
    
    // auto refresh interval (5 seconds)
    const AUTO_REFRESH_MS = 5000;
    
    let refreshInterval = null;
    let isLoggedIn = false;
    
    // ==================================================
    // LOGIN FUNCTIONS
    // ==================================================
    function attemptLogin() {
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
      const errorDiv = document.getElementById('loginErrorMsg');
      
      if (username === ADMIN_USER && password === ADMIN_PASS) {
        // login success
        errorDiv.style.color = '#0a0';
        errorDiv.innerHTML = '✓ login successful, loading dashboard...';
        isLoggedIn = true;
        
        // hide login container, show main content
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        
        // load data for first time
        loadAccessLog();
        startAutoRefresh();
      } else {
        // wrong credentials
        errorDiv.style.color = '#a00';
        errorDiv.innerHTML = '❌ invalid username or password. access denied.';
        // clear password field for security
        document.getElementById('loginPassword').value = '';
      }
    }
    
    function logout() {
      // stop auto refresh
      if (refreshInterval) {
        clearInterval(refreshInterval);
        refreshInterval = null;
      }
      
      isLoggedIn = false;
      
      // hide main content, show login screen
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('loginContainer').style.display = 'block';
      
      // clear login fields
      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginErrorMsg').innerHTML = '';
      
      // optional: reset stats display to zeros
      document.getElementById('totalAccess').textContent = '0';
      document.getElementById('grantedAccess').textContent = '0';
      document.getElementById('deniedAccess').textContent = '0';
      document.getElementById('systemStatus').textContent = 'loading...';
      document.getElementById('lastUpdate').textContent = '--';
    }
    
    // ==================================================
    // GITHUB DATA LOADING FUNCTIONS
    // ==================================================
    function getDataUrl() {
      return `https://${GITHUB_USERNAME}.github.io/${REPO_NAME}/${FILE_PATH}?t=${Date.now()}`;
    }
    
    function loadAccessLog() {
      // only load if user is logged in
      if (!isLoggedIn) {
        return;
      }
      
      const tbody = document.getElementById('logEntries');
      const statusSpan = document.getElementById('systemStatus');
      const lastUpdateSpan = document.getElementById('lastUpdate');
      
      statusSpan.textContent = 'fetching...';
      
      const url = getDataUrl();
      
      fetch(url, {
        cache: 'no-cache',
        headers: {
          'Cache-Control': 'no-cache, no-store, must-revalidate',
          'Pragma': 'no-cache'
        }
      })
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.text();
      })
      .then(rawText => {
        // process data.txt content
        const allLines = rawText.split(/\r?\n/);
        
        // filter out empty lines and comment lines (starting with #)
        const dataLines = allLines.filter(line => {
          let trimmed = line.trim();
          return trimmed !== '' && !trimmed.startsWith('#');
        });
        
        if (dataLines.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" align="center">no access records yet. scan an RFID card.</td></tr>`;
          statusSpan.textContent = 'online (no data)';
          updateStats(0, 0, 0);
          lastUpdateSpan.textContent = new Date().toLocaleString();
          return;
        }
        
        // clear old table rows
        tbody.innerHTML = '';
        
        let totalScans = 0;
        let grantedTotal = 0;
        let deniedTotal = 0;
        
        // show last 100 entries (newest first)
        const reversedEntries = dataLines.slice(-100).reverse();
        
        for (let i = 0; i < reversedEntries.length; i++) {
          const line = reversedEntries[i];
          const parts = line.split('|').map(p => p.trim());
          
          if (parts.length >= 3) {
            const timestamp = parts[0];
            const uid = parts[1];
            const accessStatusRaw = parts[2];
            
            // count stats
            totalScans++;
            if (accessStatusRaw.toUpperCase() === 'GRANTED') {
              grantedTotal++;
            } else if (accessStatusRaw.toUpperCase() === 'DENIED') {
              deniedTotal++;
            }
            // unknown status is just ignored in counts but displayed as is
            
            // create row
            const row = tbody.insertRow();
            const rowNum = i + 1;
            
            const cellNum = row.insertCell(0);
            cellNum.textContent = rowNum;
            
            const cellTime = row.insertCell(1);
            cellTime.textContent = timestamp;
            
            const cellUid = row.insertCell(2);
            const uidSpan = document.createElement('span');
            uidSpan.textContent = uid;
            uidSpan.style.fontFamily = 'monospace';
            uidSpan.style.backgroundColor = '#f0f0f0';
            uidSpan.style.padding = '2px 6px';
            cellUid.appendChild(uidSpan);
            
            const cellStatus = row.insertCell(3);
            if (accessStatusRaw.toUpperCase() === 'GRANTED') {
              cellStatus.textContent = 'GRANTED';
              cellStatus.style.color = '#155724';
              cellStatus.style.fontWeight = 'bold';
            } else if (accessStatusRaw.toUpperCase() === 'DENIED') {
              cellStatus.textContent = 'DENIED';
              cellStatus.style.color = '#721c24';
              cellStatus.style.fontWeight = 'bold';
            } else {
              cellStatus.textContent = accessStatusRaw;
            }
          } else {
            console.warn('skipping malformed line:', line);
          }
        }
        
        updateStats(totalScans, grantedTotal, deniedTotal);
        statusSpan.textContent = 'online';
        lastUpdateSpan.textContent = new Date().toLocaleString();
      })
      .catch(error => {
        console.error('error loading data:', error);
        tbody.innerHTML = `
          <tr>
            <td colspan="4" align="center" style="color: #a00;">
              error loading data from github.<br>
              double-check:<br>
              - repo is public: ${GITHUB_USERNAME}/${REPO_NAME}<br>
              - file path: ${FILE_PATH}<br>
              - username spelling
            </td>
          </tr>
        `;
        statusSpan.textContent = 'offline (fetch error)';
        updateStats(0, 0, 0);
        lastUpdateSpan.textContent = new Date().toLocaleString() + ' (error)';
      });
    }
    
    function updateStats(total, granted, denied) {
      // only update if main content elements exist (they do, but check anyway)
      if (document.getElementById('totalAccess')) {
        document.getElementById('totalAccess').textContent = total;
        document.getElementById('grantedAccess').textContent = granted;
        document.getElementById('deniedAccess').textContent = denied;
      }
    }
    
    function startAutoRefresh() {
      if (refreshInterval) {
        clearInterval(refreshInterval);
      }
      refreshInterval = setInterval(() => {
        // only refresh if still logged in
        if (isLoggedIn) {
          loadAccessLog();
        }
      }, AUTO_REFRESH_MS);
    }
    
    // ==================================================
    // HANDLE PAGE LOAD - ensure login screen visible
    // ==================================================
    document.addEventListener('DOMContentLoaded', () => {
      // make sure main content is hidden, login container visible
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('loginContainer').style.display = 'block';
      
      // clear any previous interval
      if (refreshInterval) {
        clearInterval(refreshInterval);
        refreshInterval = null;
      }
      
      // set focus on username field
      document.getElementById('loginUsername').focus();
      
      // allow Enter key to submit login
      const passField = document.getElementById('loginPassword');
      const userField = document.getElementById('loginUsername');
      
      function handleEnter(e) {
        if (e.key === 'Enter') {
          attemptLogin();
        }
      }
      
      passField.addEventListener('keypress', handleEnter);
      userField.addEventListener('keypress', handleEnter);
    });
  </script>
</body>
</html>
