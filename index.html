<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Message Board</title>
    <link rel="stylesheet" href="style.css">
    <script src="users.js"></script>
</head>
<body>
    <div class="container">
        <h1>📝 Message Board System</h1>
        
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showTab('login')">Login</button>
            <button class="tab-btn" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login-tab" class="tab-content active">
            <form id="loginForm">
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <div id="loginError" class="error-message"></div>
        </div>

        <!-- Register Form -->
        <div id="register-tab" class="tab-content">
            <form id="registerForm">
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" id="regUsername" required pattern="[a-zA-Z0-9_]{3,20}">
                    <small>3-20 characters (letters, numbers, underscore)</small>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password:</label>
                    <input type="password" id="regConfirmPassword" required>
                </div>
                <div class="form-group">
                    <label>Date of Birth:</label>
                    <input type="date" id="regDob" required>
                </div>
                <button type="submit" class="btn-primary">Register</button>
            </form>
            <div id="registerError" class="error-message"></div>
            <div id="registerSuccess" class="success-message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
